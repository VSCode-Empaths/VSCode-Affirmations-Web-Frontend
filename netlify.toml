# Netlify: publish the repo root (where index.html lives). If the UI “Publish directory”
# is not `.`, the deploy can look empty and every URL 404s.
# Build: Netlify + npm will run `npm run build` when package.json exists; a missing script
# fails the build and leaves the site on an old or empty deploy.
[build]
  command = "npm run build"
  publish = "."
